<mat-toolbar>Harry Potter Characters Filter</mat-toolbar>

<div class="filter-container">
  <mat-form-field appearance="outline">
    <mat-label>Select House</mat-label>
    <mat-select (selectionChange)="onHouseChange($event.value)">
      @for (house of houses; track house) {
        <mat-option [value]="house">{{ house }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>

<div class="characters-grid">
  @for (character of characters; track character.id) {
    <mat-card class="character-card">
      @if (character.image) {
        <img
          [src]="character.image"
          [alt]="character.name"
          class="character-image"
        />
      } @else {
        <div class="image-placeholder"></div>
      }

      <mat-card-content>
        <h3 class="character-name">{{ character.name }}</h3>
        <p class="character-actor">{{ character.actor }}</p>
        <p class="character-house" [ngClass]="getHouseClass(character.house)">
          {{ character.house }}
        </p>
      </mat-card-content>
    </mat-card>
  }
</div>
